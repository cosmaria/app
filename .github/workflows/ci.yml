name: CI

# Pipeline de integração contínua (doc 13 §14 / doc 14 §15).
# Roda em todo push e PR. Um PR que viole as fronteiras de módulo
# (doc 14 §6) FALHA aqui, antes de qualquer revisão humana.
#
# Portões de qualidade do Design System v1 rodam DENTRO deste mesmo pipeline,
# sem job dedicado (evita redundância):
#   - testes de tokens/tema/paridade e do Button piloto → passo Test (`npm test`);
#   - fronteiras Nx do shared (design-tokens/ui-components) → passo Lint;
#   - tipos dos tokens/componentes → passo Typecheck.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# Cancela execuções supersedidas do mesmo ref (economia de runner, sem risco).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies (lockfile congelado)
        run: npm ci

      - name: Lint (inclui enforcement de fronteiras de módulo)
        run: npx nx run-many -t lint

      - name: Typecheck
        run: npx nx run-many -t typecheck

      - name: Build
        run: npx nx run-many -t build

      - name: Test
        run: npm test

      - name: Format check
        run: npm run format:check
